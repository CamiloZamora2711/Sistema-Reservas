{% extends 'layout.html' %}

{% block title %}Calendario de Reservas{% endblock %}

{% block content %}
<h2 class="mb-4">Calendario de Reservas</h2>

<div id='calendar' class="card p-3 shadow-sm"></div>

<!-- FullCalendar CSS y JS -->
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css' rel='stylesheet' />
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/locales/es.js'></script>


<script>
document.addEventListener('DOMContentLoaded', function () {
  var calendarEl = document.getElementById('calendar');

  var calendar = new FullCalendar.Calendar(calendarEl, {
    locale: 'es',
    initialView: 'dayGridMonth',
    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: 'dayGridMonth,timeGridWeek'
    },
    events: {{ eventos | tojson }},
    eventClick: function(info) {
      info.jsEvent.preventDefault();
      if (info.event.url) {
        window.location.href = info.event.url;
      }
    },
    eventDidMount: function(info) {
      if (info.event.extendedProps.nombre) {
        info.el.title = "Reservado por: " + info.event.extendedProps.nombre;
      }
    }
  });

  calendar.render();
});
</script>

<div class="mt-4">
  <a href="{{ url_for('index') }}" class="btn btn-outline-primary">
    <i class="bi bi-arrow-left"></i> Volver a reservas
  </a>
  <a href="{{ url_for('admin') }}" class="btn btn-outline-dark">
    <i class="bi bi-shield-lock"></i> Panel Administrador
  </a>
</div>
{% endblock %}
