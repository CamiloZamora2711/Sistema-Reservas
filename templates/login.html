{% extends "base.html" %}

{% block title %}Iniciar Sesión Admin{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card">
            <div class="card-header text-center">
                <h4 class="mb-0"><i class="fas fa-lock me-2"></i>Acceso Administrativo</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="clave" class="form-label">Contraseña de Administrador</label>
                        <input type="password" class="form-control" id="clave" name="clave" 
                               placeholder="Ingresa la contraseña" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt me-2"></i>Ingresar
                    </button>
                </form>
            </div>
            <div class="card-footer text-center">
                <small class="text-muted">
                    <i class="fas fa-shield-alt me-1"></i>
                    Acceso restringido al personal autorizado
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
